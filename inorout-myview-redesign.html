<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>In or Out — MY VIEW redesign mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0A0A08; --s1:#141412; --s2:#1C1C19; --s3:#222220;
    --t1:#F2F0EA; --t2:#D0CCC2; --t3:#8A877E;
    --gold:#E8A020; --gold2:rgba(232,160,32,0.15); --goldb:rgba(232,160,32,0.4);
    --green:#3DDC6A; --green2:rgba(61,220,106,0.13); --greenb:rgba(61,220,106,0.35);
    --red:#FF4040; --red2:rgba(255,64,64,0.13); --redb:rgba(255,64,64,0.35);
    --amber:#FFB020; --amber2:rgba(255,176,32,0.13);
    --purple:#B060F0; --purple2:rgba(176,96,240,0.13); --purpleb:rgba(176,96,240,0.35);
    --border:rgba(255,255,255,0.10); --b2:rgba(255,255,255,0.05);
    --r:16px; --rs:10px;
    --font-display:'Bebas Neue',sans-serif;
    --font-body:'DM Sans',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:#050504;font-family:var(--font-body);color:var(--t1)}
  body{display:flex;flex-wrap:wrap;gap:40px;justify-content:center;align-items:flex-start;padding:40px 16px 80px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:14px}
  .stage h2{font-family:var(--font-display);font-size:22px;letter-spacing:.04em;color:var(--t2);font-weight:400}
  .stage .sub{font-size:12px;color:var(--t3);max-width:300px;text-align:center;line-height:1.5}
  /* phone frame */
  .phone{width:390px;height:760px;background:var(--bg);border-radius:42px;border:1px solid var(--border);
    box-shadow:0 0 0 10px #0d0d0b,0 30px 70px rgba(0,0,0,.7);overflow:hidden;position:relative}
  .phone .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#000;border-radius:14px;z-index:50}
  .screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:54px 16px 92px;scrollbar-width:none}
  .screen::-webkit-scrollbar{display:none}
  .tokens{max-width:280px;color:var(--t3);font-size:11px;line-height:1.6}
  .tokens b{color:var(--gold)}
  #root{display:contents}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React, { useState, useRef } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import { motion, AnimatePresence, useMotionValue, animate, LayoutGroup } from 'https://esm.sh/framer-motion@11.15.0?deps=react@18.3.1,react-dom@18.3.1';

const h = React.createElement;
const spring = { type:'spring', stiffness:520, damping:30, mass:0.7 };
const softSpring = { type:'spring', stiffness:300, damping:26 };

// ---- tiny inline icon set (stroke, thin, like Phosphor weight=thin) ----
const Ico = ({d, size=18, fill='none', sw=1.4, color='currentColor', children}) =>
  h('svg',{width:size,height:size,viewBox:'0 0 24 24',fill,stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'}, children||h('path',{d}));
const ICheck = (p)=>h(Ico,{...p}, h('path',{d:'M20 6 9 17l-5-5'}));
const ICross = (p)=>h(Ico,{...p}, h('path',{d:'M18 6 6 18M6 6l12 12'}));
const IMaybe = (p)=>h(Ico,{...p}, h('path',{d:'M9.1 9a3 3 0 1 1 5.8 1c0 2-3 2.5-3 4'}), h('path',{d:'M12 17h.01'}), h('circle',{cx:12,cy:12,r:9.5}));
const IReserve = (p)=>h(Ico,{...p}, h('path',{d:'M12 5v14M19 12l-7 7-7-7'}));
const IClock = (p)=>h(Ico,{...p}, h('circle',{cx:12,cy:12,r:9}), h('path',{d:'M12 7v5l3 2'}));
const IPin = (p)=>h(Ico,{...p}, h('path',{d:'M12 21s7-5.6 7-11a7 7 0 1 0-14 0c0 5.4 7 11 7 11Z'}), h('circle',{cx:12,cy:10,r:2.4}));
const IPlus = (p)=>h(Ico,{...p}, h('path',{d:'M12 5v14M5 12h14'}));
const IBolt = (p)=>h(Ico,{...p,fill:'currentColor',sw:0}, h('path',{d:'M13 2 4.5 13.5H11l-1 8.5L19.5 10H13z'}));
const IWhats = (p)=>h(Ico,{...p}, h('path',{d:'M12 3a9 9 0 0 0-7.7 13.6L3 21l4.5-1.2A9 9 0 1 0 12 3Z'}), h('path',{d:'M8.5 8.5c0 4 3 6.5 6.5 6.5 .8 0 1.2-1 .8-1.6l-1.4-.9c-.4-.2-.7 0-1 .3-.5.5-1.6-.4-2.3-1.6-.2-.4-.1-.7.2-1 .3-.3.5-.7.3-1.1l-.7-1.5c-.3-.6-1.3-.4-1.6.1'}));

const PEOPLE = [
  {n:'Finbar', c:'#E8A020'},{n:'Hassan', c:'#3DDC6A'},{n:'Steve', c:'#B060F0'},
  {n:'Priya', c:'#FF6090'},{n:'Danny', c:'#60A0FF'},{n:'Sarah', c:'#FFB020'},
  {n:'Marcus', c:'#3DDC6A'},{n:'Kieran', c:'#E8A020'},{n:'Luke', c:'#B060F0'},
  {n:'Dave', c:'#60A0FF'},{n:'Amir', c:'#FF6090'},
];
const CAP = 14;

// animated rolling number
function RollNumber({value, style}){
  const ref = useRef(null);
  const mv = useMotionValue(0);
  React.useEffect(()=>{
    const controls = animate(mv, value, { duration:0.6, ease:[0.22,1,0.36,1],
      onUpdate:(v)=>{ if(ref.current) ref.current.textContent = Math.round(v); }});
    return ()=>controls.stop();
  },[value]);
  return h('span',{ref, style});
}

function Avatar({p, i, size=30}){
  const initials = p.n.slice(0,2).toUpperCase();
  return h(motion.div,{
    layout:true,
    initial:{opacity:0, scale:0.3, y:8},
    animate:{opacity:1, scale:1, y:0},
    exit:{opacity:0, scale:0.3},
    transition:{...spring, delay: Math.min(i*0.035, 0.4)},
    style:{width:size,height:size,borderRadius:'50%',flexShrink:0,
      display:'grid',placeItems:'center',fontSize:11,fontWeight:700,
      color:'#0A0A08', background:p.c,
      boxShadow:'0 2px 6px rgba(0,0,0,.4)', border:'2px solid var(--bg)',
      marginLeft: i? -10:0}
  }, initials);
}

const STATES = {
  in:     {label:'IN',      color:'var(--green)', glow:'var(--greenb)', bg:'var(--green2)', Icon:ICheck},
  out:    {label:'OUT',     color:'var(--red)',   glow:'var(--redb)',   bg:'var(--red2)',   Icon:ICross},
  maybe:  {label:'MAYBE',   color:'var(--amber)', glow:'rgba(255,176,32,.35)', bg:'var(--amber2)', Icon:IMaybe},
  reserve:{label:'RESERVE', color:'var(--purple)',glow:'var(--purpleb)',bg:'var(--purple2)',Icon:IReserve},
};

function MyView(){
  const [pick, setPick] = useState(null);              // 'in'|'out'|'maybe'|'reserve'|null
  const [roster, setRoster] = useState(PEOPLE.slice(0,5)); // who's already in
  const [showMore, setShowMore] = useState(false);
  const me = {n:'Hassan', c:'#3DDC6A'};

  const confirmed = roster.length; // roster already includes "Me" when IN is picked
  const pct = Math.min(confirmed / CAP, 1);
  const spotsLeft = Math.max(CAP - confirmed, 0);

  function choose(k){
    setPick(prev=>{
      const next = prev===k ? null : k;
      // reflect my own card on the roster when I go IN
      setRoster(r=>{
        const without = r.filter(p=>p.n!=='Me');
        if(next==='in') return [...without, {n:'Me', c:'#F2F0EA', me:true}];
        return without;
      });
      if(next && navigator.vibrate) navigator.vibrate(12);
      return next;
    });
  }

  const sel = pick ? STATES[pick] : null;

  return h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
    // ---------- HEADER ----------
    h('div',{style:{display:'flex',alignItems:'center',gap:10}},
      h('div',{style:{width:34,height:34,borderRadius:'50%',background:'var(--s3)',display:'grid',placeItems:'center',
        fontFamily:'var(--font-display)',fontSize:15,color:'var(--gold)',border:'1px solid var(--border)'}},'HA'),
      h('div',{style:{fontSize:11,letterSpacing:'.18em',color:'var(--t3)',fontWeight:600}},'FINBARS TUESDAYS'),
      h('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--green)'}},
        h(motion.span,{animate:{opacity:[1,.3,1]},transition:{repeat:Infinity,duration:1.8},
          style:{width:7,height:7,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}),
        'GAME OPEN')
    ),

    // ---------- HERO MATCHDAY CARD (fuses fixture + progress + roster) ----------
    h(motion.div,{layout:true, transition:softSpring,
      style:{position:'relative',borderRadius:'var(--r)',overflow:'hidden',
        border:'1px solid var(--border)', background:'linear-gradient(160deg,#13251a,#0c140f 60%)',
        padding:'16px 16px 18px'}},
      // faint pitch lines
      h('div',{style:{position:'absolute',inset:0,opacity:.10,backgroundImage:
        'radial-gradient(circle at 50% 120%, var(--green) 0, transparent 42%)'}}),
      h('div',{style:{position:'relative'}},
        h('div',{style:{fontSize:10,letterSpacing:'.2em',color:'var(--gold)',fontWeight:700}},'THIS WEEK'),
        h('div',{style:{fontFamily:'var(--font-display)',fontSize:34,lineHeight:.95,marginTop:2}},
          h('span',{style:{color:'var(--t1)'}},'TUESDAY NIGHT '),
          h('span',{style:{color:'var(--green)'}},'FOOTBALL')),
        // meta row
        h('div',{style:{display:'flex',gap:14,marginTop:10,fontSize:12.5,color:'var(--t2)',alignItems:'center',flexWrap:'wrap'}},
          h('span',{style:{display:'flex',gap:5,alignItems:'center'}}, h(IClock,{size:14,color:'var(--t3)'}),'20:00'),
          h('span',{style:{display:'flex',gap:5,alignItems:'center'}}, h(IPin,{size:14,color:'var(--t3)'}),'Finbars, Holbrooks'),
          h('span',{style:{display:'flex',gap:5,alignItems:'center',color:'var(--green)'}}, h(IBolt,{size:13,color:'var(--green)'}),'£5')),

        // ---- progress to cap ----
        h('div',{style:{marginTop:16,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
          h('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
            h(RollNumber,{value:confirmed, style:{fontFamily:'var(--font-display)',fontSize:40,lineHeight:1,color:'var(--green)'}}),
            h('span',{style:{fontFamily:'var(--font-display)',fontSize:22,color:'var(--t3)'}}, '/ '+CAP),
          ),
          h(motion.div,{key:spotsLeft, initial:{scale:0.7,opacity:0},animate:{scale:1,opacity:1},transition:spring,
            style:{fontSize:11,fontWeight:700,padding:'5px 10px',borderRadius:20,
              background: spotsLeft<=3?'var(--red2)':'var(--gold2)', color: spotsLeft<=3?'var(--red)':'var(--gold)',
              border:'1px solid '+(spotsLeft<=3?'var(--redb)':'var(--goldb)')}},
            spotsLeft>0 ? spotsLeft+' SPOTS LEFT' : 'FULL — RESERVES OPEN')
        ),
        // filling bar
        h('div',{style:{marginTop:8,height:8,borderRadius:8,background:'rgba(255,255,255,.07)',overflow:'hidden'}},
          h(motion.div,{animate:{width:(pct*100)+'%'},transition:softSpring,
            style:{height:'100%',borderRadius:8,background:'linear-gradient(90deg,var(--green),#9ef0b6)'}})),
        // roster avatars
        h('div',{style:{marginTop:14,display:'flex',alignItems:'center'}},
          h(LayoutGroup,null,
            h('div',{style:{display:'flex'}},
              h(AnimatePresence,null,
                roster.map((p,i)=>h(Avatar,{key:p.n, p, i}))),
            ),
          ),
          h('span',{style:{marginLeft:12,fontSize:12,color:'var(--t3)'}},
            roster.some(p=>p.me)?'You + '+(roster.length-1)+' confirmed':roster.length+' confirmed'))
      )
    ),

    // ---------- THE DECISION (primary action — the heart of the app) ----------
    h('div',{style:{borderRadius:'var(--r)',border:'1px solid '+(sel? sel.glow:'var(--border)'),
      background:'var(--s1)',padding:'14px 14px 16px',transition:'border-color .3s'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
        h('div',{style:{fontSize:11,letterSpacing:'.14em',color:'var(--t3)',fontWeight:600}},
          pick? 'YOU ARE ': 'ARE YOU IN THIS WEEK?'),
        h(AnimatePresence,{mode:'wait'},
          pick && h(motion.div,{key:pick, initial:{opacity:0,x:8},animate:{opacity:1,x:0},exit:{opacity:0,x:-8},
            style:{fontFamily:'var(--font-display)',fontSize:20,color:sel.color,display:'flex',gap:6,alignItems:'center'}},
            h(sel.Icon,{size:18,color:sel.color}), sel.label))
      ),

      // Big primary IN, with the three alternatives as a subordinate row
      h(LayoutGroup,null,
        h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          // Primary IN
          h(motion.button,{onClick:()=>choose('in'), whileTap:{scale:0.97}, transition:spring,
            style:{position:'relative',height:60,borderRadius:14,border:'none',cursor:'pointer',
              fontFamily:'var(--font-display)',fontSize:26,letterSpacing:'.04em',
              color: pick==='in'?'#06210f':'var(--green)',
              background:'transparent',overflow:'hidden'}},
            pick==='in' && h(motion.div,{layoutId:'fill', transition:spring,
              style:{position:'absolute',inset:0,borderRadius:14,background:'linear-gradient(180deg,#52e87d,#2ec45a)'}}),
            pick!=='in' && h('div',{style:{position:'absolute',inset:0,borderRadius:14,
              background:'var(--green2)',border:'1.5px solid var(--greenb)'}}),
            h('span',{style:{position:'relative',display:'flex',gap:8,alignItems:'center',justifyContent:'center',height:'100%'}},
              h(motion.span,{animate: pick==='in'?{scale:[0.6,1.25,1]}:{scale:1}, transition:spring},
                h(ICheck,{size:24,sw:2.4,color: pick==='in'?'#06210f':'var(--green)'})),
              "I'M IN")),
          // secondary row
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
            ['out','maybe','reserve'].map(k=>{
              const s = STATES[k]; const on = pick===k;
              return h(motion.button,{key:k, onClick:()=>choose(k), whileTap:{scale:0.95}, transition:spring,
                style:{position:'relative',height:54,borderRadius:12,border:'none',cursor:'pointer',
                  background:'transparent',overflow:'hidden',
                  display:'flex',flexDirection:'column',gap:3,alignItems:'center',justifyContent:'center'}},
                on && h(motion.div,{layoutId:'fill2_'+k, transition:spring,
                  style:{position:'absolute',inset:0,borderRadius:12,background:s.bg,border:'1.5px solid '+s.glow}}),
                !on && h('div',{style:{position:'absolute',inset:0,borderRadius:12,background:'var(--s2)',border:'1px solid var(--border)'}}),
                h('span',{style:{position:'relative'}}, h(s.Icon,{size:18, color: on?s.color:'var(--t3)'})),
                h('span',{style:{position:'relative',fontFamily:'var(--font-display)',fontSize:14,letterSpacing:'.05em',
                  color:on?s.color:'var(--t2)'}}, s.label));
            }))
        )
      ),
      // payment chip — promoted from a tiny text link to a clear status
      h('div',{style:{marginTop:12,display:'flex',gap:8,alignItems:'center',justifyContent:'space-between'}},
        h('div',{style:{display:'flex',gap:7,alignItems:'center',fontSize:12.5}},
          h('span',{style:{width:8,height:8,borderRadius:'50%',background:'var(--green)'}}),
          h('span',{style:{color:'var(--t2)'}},'Nothing owed — you’re square')),
        h('button',{style:{fontSize:12,color:'var(--gold)',background:'none',border:'none',cursor:'pointer',fontWeight:600}},'View ledger'))
    ),

    // ---------- PROGRESSIVE DISCLOSURE: secondary actions ----------
    h('div',{style:{borderRadius:'var(--r)',border:'1px solid var(--border)',background:'var(--s1)',overflow:'hidden'}},
      h('button',{onClick:()=>setShowMore(s=>!s),
        style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'13px 15px',background:'none',border:'none',cursor:'pointer',color:'var(--t2)'}},
        h('span',{style:{fontSize:13,fontWeight:600}},'More options'),
        h(motion.span,{animate:{rotate:showMore?180:0},transition:softSpring}, h(Ico,{size:16,color:'var(--t3)'}, h('path',{d:'M6 9l6 6 6-6'})))),
      h(AnimatePresence,{initial:false},
        showMore && h(motion.div,{initial:{height:0,opacity:0},animate:{height:'auto',opacity:1},exit:{height:0,opacity:0},transition:softSpring,
          style:{overflow:'hidden'}},
          h('div',{style:{padding:'4px 12px 12px',display:'flex',flexDirection:'column',gap:8}},
            [['Plus one','Bring a guest', IPlus,'var(--gold)'],
             ['Mark injured','Sit this one out', ICross,'var(--red)'],
             ['Add a note','e.g. “Might be 5 mins late”', IClock,'var(--t3)']].map(([t,sb,Ic,col],i)=>
              h(motion.button,{key:t, whileTap:{scale:0.98},
                initial:{opacity:0,x:-10},animate:{opacity:1,x:0},transition:{...softSpring,delay:i*0.05},
                style:{display:'flex',gap:12,alignItems:'center',padding:'11px 12px',borderRadius:12,
                  background:'var(--s2)',border:'1px solid var(--border)',cursor:'pointer',textAlign:'left'}},
                h('span',{style:{width:34,height:34,borderRadius:9,display:'grid',placeItems:'center',background:'var(--s3)'}}, h(Ic,{size:17,color:col})),
                h('span',{style:{display:'flex',flexDirection:'column'}},
                  h('span',{style:{fontSize:13.5,color:'var(--t1)',fontWeight:600}},t),
                  h('span',{style:{fontSize:11.5,color:'var(--t3)'}},sb)))))) )
    ),

    // share nudge
    h(motion.button,{whileTap:{scale:0.98},
      style:{display:'flex',gap:9,alignItems:'center',justifyContent:'center',padding:'12px',borderRadius:14,
        border:'1px solid var(--greenb)',background:'var(--green2)',cursor:'pointer',color:'var(--green)',fontWeight:600,fontSize:13.5}},
      h(IWhats,{size:17,color:'var(--green)'}),'Nudge the '+spotsLeft+' who haven’t replied')
  );
}

// bottom tab bar
function Tabs(){
  const items=[['MY VIEW',true],['STATS',false],['RESULTS',false],['MY IO',false]];
  return h('div',{style:{position:'absolute',bottom:0,left:0,right:0,height:74,
    background:'linear-gradient(180deg,rgba(10,10,8,.4),var(--bg) 40%)',backdropFilter:'blur(12px)',
    borderTop:'1px solid var(--border)',display:'flex',alignItems:'flex-start',padding:'10px 14px 0',zIndex:40}},
    items.map(([t,on])=>h('div',{key:t,style:{flex:1,display:'flex',flexDirection:'column',gap:5,alignItems:'center'}},
      h('div',{style:{width:24,height:24,borderRadius:7,display:'grid',placeItems:'center',
        background:on?'var(--gold2)':'transparent'}},
        h('div',{style:{width:13,height:13,borderRadius:4,border:'1.5px solid '+(on?'var(--gold)':'var(--t3)')}})),
      h('span',{style:{fontSize:9.5,letterSpacing:'.06em',color:on?'var(--gold)':'var(--t3)',fontWeight:600}},t),
      on && h(motion.div,{layoutId:'tabdot',style:{width:4,height:4,borderRadius:'50%',background:'var(--gold)'}}))))
}

function App(){
  return h(React.Fragment,null,
    h('div',{className:'stage'},
      h('h2',null,'MY VIEW — redesigned'),
      h('div',{className:'sub'},'Tap I’M IN. Watch the count roll, your avatar drop into the roster, the bar fill, and the selection lock with a spring. Tap "More options" for progressive disclosure.'),
      h('div',{className:'phone'},
        h('div',{className:'notch'}),
        h('div',{className:'screen'}, h(MyView)),
        h(LayoutGroup,null, h(Tabs))
      ),
      h('div',{className:'tokens'},
        h('p',null, h('b',null,'What changed & why →'),' fuller rationale printed in the chat. Palette, fonts and icon weight are unchanged from ',h('b',null,'tokens.css'),' — this sharpens hierarchy and motion, it doesn’t restyle the brand.'))
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
