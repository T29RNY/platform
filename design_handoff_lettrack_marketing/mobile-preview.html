<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1200"/>
<title>Mobile preview</title>
<style>
  html, body { margin: 0; padding: 0; background: #1a1d2a; font-family: -apple-system, "Segoe UI", sans-serif; color: #aab; }
  .row { display: flex; gap: 24px; padding: 24px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .col h3 { color: #fff; font-weight: 500; font-size: 14px; margin: 0; }
  .phone {
    width: 390px; height: 844px;
    border-radius: 36px;
    border: 8px solid #0a0c14;
    background: #fff;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
  }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <h3>Home — 390 × 844</h3>
    <div class="phone"><iframe src="LetTrack Home.html"></iframe></div>
  </div>
  <div class="col">
    <h3>Security — 390 × 844</h3>
    <div class="phone"><iframe src="LetTrack Security.html"></iframe></div>
  </div>
</div>
</body>
</html>
