<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="In or Out" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>In or Out — Weekly Football Organiser</title>
    <meta name="description" content="The fastest way to organise your weekly football game." />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0c0c0c; color: #F3F0EA; font-family: Inter, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
      #root { min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Unregister any old service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
    </script>
  </body>
</html>
